workflows:
  ios-capacitor:
    name: iOS Capacitor Build
    instance_type: mac_mini_m2
    max_build_duration: 120

    integrations:
      app_store_connect: codemagic

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gylizabeauty.mobile
      vars:
        XCODE_PROJECT: "App.xcodeproj"
        XCODE_SCHEME: "App"
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Build web app if script exists
        script: |
          npm run build --if-present

      - name: Sync Capacitor iOS
        script: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          if [ -f Podfile ]; then
            pod install
          fi

      - name: Set up code signing
        script: |
          cd ios/App
          xcode-project use-profiles

      - name: Set build number
        script: |
          cd ios/App
          if [ -n "$APP_STORE_APPLE_ID" ]; then
            LATEST_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" || echo 0)
            if printf '%s' "$LATEST_BUILD_NUMBER" | grep -Eq '^[0-9]+$'; then
              agvtool new-version -all "$((LATEST_BUILD_NUMBER + 1))"
            else
              agvtool new-version -all "$BUILD_NUMBER"
            fi
          else
            agvtool new-version -all "$BUILD_NUMBER"
          fi

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - ios/App/build/ios/ipa/*.ipa
      - ios/App/build/**/*.app
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
