<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Gyliza Design</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
        background: #f1eeec;
        color: #252418;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(187, 198, 189, 0.7), transparent 40%),
          linear-gradient(135deg, #f1eeec, #d6ded7);
      }

      main {
        width: min(560px, 100%);
        padding: 32px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 20px 60px rgba(37, 36, 24, 0.12);
        backdrop-filter: blur(18px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 2rem;
      }

      p {
        margin: 0;
        line-height: 1.6;
      }

      code {
        font-family: Consolas, monospace;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Gyliza Design Mobile</h1>
      <p>
        Capacitor is installed and the Android wrapper can now load content from
        <code>mobile/www</code>.
      </p>
    </main>
  </body>
</html>
